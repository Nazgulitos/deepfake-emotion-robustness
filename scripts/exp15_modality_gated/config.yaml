seed: 42
device: cuda

# Architecture
embed_dim: 16
dropout: 0.2
# emotion_dim is auto-detected from feature matrix at runtime
quality_dim: 4   # face_det_score_mean, face_size_mean, frame_count, ucf_score_variance (no blur col)

# Training
batch_size: 32
n_epochs: 100
patience: 15
lr: 1.0e-3
weight_decay: 1.0e-4
optimizer: adamw

# Loss
pos_weight_auto: true   # compute neg/pos from training set

# Cross-validation
n_folds: 5
group_col: identity

# Feature columns — verified against actual CSV files
emotion_feature_cols:
  # 9 statistical emotion features
  - mean_valence
  - std_valence
  - mean_arousal
  - std_arousal
  - max_arousal
  - emotion_entropy
  - transition_rate
  - arousal_variation
  - neutral_ratio
  # 40 mean_score emotion features
  - mean_score_affection
  - mean_score_amusement
  - mean_score_anger
  - mean_score_astonishment_surprise
  - mean_score_awe
  - mean_score_bitterness
  - mean_score_concentration
  - mean_score_confusion
  - mean_score_contemplation
  - mean_score_contempt
  - mean_score_contentment
  - mean_score_disappointment
  - mean_score_disgust
  - mean_score_distress
  - mean_score_doubt
  - mean_score_elation
  - mean_score_embarrassment
  - mean_score_emotional_numbness
  - mean_score_fatigue_exhaustion
  - mean_score_fear
  - mean_score_helplessness
  - mean_score_hope_enthusiasm_optimism
  - mean_score_impatience_and_irritability
  - mean_score_infatuation
  - mean_score_interest
  - mean_score_intoxication_altered_states_of_consciousness
  - mean_score_jealousy_&_envy
  - mean_score_longing
  - mean_score_malevolence_malice
  - mean_score_pain
  - mean_score_pleasure_ecstasy
  - mean_score_pride
  - mean_score_relief
  - mean_score_sadness
  - mean_score_sexual_lust
  - mean_score_shame
  - mean_score_sourness
  - mean_score_teasing
  - mean_score_thankfulness_gratitude
  - mean_score_triumph

quality_feature_cols:
  - face_det_score_mean
  - face_size_mean
  - frame_count
  - ucf_score_variance
# Note: blur_mean omitted — no Laplacian column in face manifest

# Detector to use as primary input
primary_detector: ucf

# Split strategy:
#   use_predefined_split: true  → use split column (train/val → trainval for CV, test → holdout)
#   use_predefined_split: false → use all 790 videos for CV (no holdout)
use_predefined_split: true

# Paths relative to project root (deepfake-emotion-robustness/)
paths:
  face_manifest: datasets/metadata/final_face_manifest.csv
  emotion_features: datasets/emotion_annotated/metadata/final_video_emotion_features.csv
  ucf_scores: datasets/detector_processed/final_ucf_scores.csv
  ucf_frame_scores: datasets/detector_processed/final_ucf_frame_scores.csv
  output_root: scripts/exp15_modality_gated/outputs
